<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4-Point Zone Editor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 16px;
    }

    .toolbar {
      width: 900px;
      max-width: 95vw;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: #111827;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #334155;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.9;
    }

    .secondary {
      background: #475569;
    }

    .canvas-wrap {
      position: relative;
      width: 900px;
      max-width: 95vw;
      border: 1px solid #334155;
      border-radius: 16px;
      overflow: hidden;
      background: #020617;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: crosshair;
    }

    textarea {
      width: 900px;
      max-width: 95vw;
      min-height: 90px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      padding: 12px;
      font-size: 14px;
    }

    .hint {
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="resetBtn" class="secondary">Reset</button>
    <button id="copyBtn">Copy Points</button>
    <span class="hint">Click đúng 4 điểm để tạo zone. Sau đó kéo thả từng góc để edit.</span>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas" width="900" height="540"></canvas>
  </div>

  <textarea id="output" readonly placeholder="Tọa độ 4 điểm sẽ hiện ở đây..."></textarea>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const output = document.getElementById("output");
    const resetBtn = document.getElementById("resetBtn");
    const copyBtn = document.getElementById("copyBtn");

    const POINT_RADIUS = 8;
    let points = [];
    let draggingIndex = -1;
    let hoverIndex = -1;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background grid nhẹ
      drawGrid();

      // Polygon
      if (points.length > 0) {
        if (points.length >= 2) {
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
          }
          if (points.length === 4) ctx.closePath();

          ctx.strokeStyle = "#22c55e";
          ctx.lineWidth = 3;
          ctx.stroke();

          if (points.length === 4) {
            ctx.fillStyle = "rgba(34,197,94,0.18)";
            ctx.fill();
          }
        }

        // Draw points
        points.forEach((p, i) => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, POINT_RADIUS, 0, Math.PI * 2);
          ctx.fillStyle = i === hoverIndex || i === draggingIndex ? "#f59e0b" : "#ef4444";
          ctx.fill();
          ctx.lineWidth = 2;
          ctx.strokeStyle = "#ffffff";
          ctx.stroke();

          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 14px Arial";
          ctx.fillText(`${i + 1}`, p.x + 12, p.y - 12);
        });
      }
    }

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = "rgba(148,163,184,0.12)";
      ctx.lineWidth = 1;

      for (let x = 0; x <= canvas.width; x += 30) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y <= canvas.height; y += 30) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function updateOutput() {
      const formatted = points.map(p => [Math.round(p.x), Math.round(p.y)]);
      output.value = JSON.stringify(formatted, null, 2);
    }

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function getPointAt(pos) {
      for (let i = 0; i < points.length; i++) {
        const dx = pos.x - points[i].x;
        const dy = pos.y - points[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist <= POINT_RADIUS + 6) return i;
      }
      return -1;
    }

    canvas.addEventListener("click", (e) => {
      if (draggingIndex !== -1) return;
      if (points.length >= 4) return;

      const pos = getMousePos(e);
      points.push({ x: pos.x, y: pos.y });
      updateOutput();
      draw();
    });

    canvas.addEventListener("mousedown", (e) => {
      const pos = getMousePos(e);
      const idx = getPointAt(pos);
      if (idx !== -1) {
        draggingIndex = idx;
        canvas.style.cursor = "grabbing";
      }
    });

    canvas.addEventListener("mousemove", (e) => {
      const pos = getMousePos(e);

      if (draggingIndex !== -1) {
        points[draggingIndex] = { x: pos.x, y: pos.y };
        updateOutput();
        draw();
        return;
      }

      hoverIndex = getPointAt(pos);
      canvas.style.cursor = hoverIndex !== -1 ? "grab" : (points.length < 4 ? "crosshair" : "default");
      draw();
    });

    canvas.addEventListener("mouseup", () => {
      draggingIndex = -1;
      canvas.style.cursor = hoverIndex !== -1 ? "grab" : (points.length < 4 ? "crosshair" : "default");
    });

    canvas.addEventListener("mouseleave", () => {
      draggingIndex = -1;
      hoverIndex = -1;
      canvas.style.cursor = points.length < 4 ? "crosshair" : "default";
      draw();
    });

    resetBtn.addEventListener("click", () => {
      points = [];
      draggingIndex = -1;
      hoverIndex = -1;
      updateOutput();
      draw();
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(output.value);
        alert("Đã copy tọa độ 4 điểm");
      } catch {
        alert("Copy lỗi, tự copy trong ô text nha");
      }
    });

    updateOutput();
    draw();
  </script>
</body>
</html>
